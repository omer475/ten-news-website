name: User Interest Clustering

# Scheduled cron DISABLED 2026-04-19: services/cluster_user_interests.py uses
# Ward's hierarchical clustering with a distance threshold (criterion='distance',
# t=1.2) which is uncapped — for power users with 1k+ engagement embeddings it
# produced 81 clusters in a single run (2026-04-18 19:02 UTC), blowing past the
# MAX_CLUSTERS=8 constant (which only applies to the K-Means variant). The
# track.js incremental path with the atomic insert_or_merge_cluster RPC now
# maintains clusters correctly with a hard 7-cluster cap. Re-enable only after
# ward_cluster has a post-clustering consolidation pass that respects MAX_CLUSTERS.
on:
  workflow_dispatch:       # Manual trigger only

jobs:
  cluster-users:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install supabase python-dotenv numpy scipy

      - name: Run clustering for all eligible users
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 services/cluster_user_interests.py --all
